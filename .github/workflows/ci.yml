name: ci
on:
  pull_request:
    branches: [main, "v*"]
  push:
    branches: [main, "v*"]
jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install stable --profile minimal
      - run: cargo build --locked || cargo build
      - run: cargo test --locked || cargo test
      - run: cargo run --locked -- validate --speq-root tests/fixtures/in-repo-mode/.speq --format json || cargo run -- validate --speq-root tests/fixtures/in-repo-mode/.speq --format json
      - run: cargo run --locked -- doctor --speq-root tests/fixtures/test-repo-mode --format json || cargo run -- doctor --speq-root tests/fixtures/test-repo-mode --format json
