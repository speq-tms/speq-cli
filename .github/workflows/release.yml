name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (example: v0.1.0-alpha.0)"
        required: true
      prerelease:
        description: "Mark release as pre-release"
        required: false
        default: "true"

permissions:
  contents: write

jobs:
  build-assets:
    name: build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x86_64
          - os: macos-13
            platform: darwin
            arch: x86_64
          - os: macos-14
            platform: darwin
            arch: aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        run: rustup toolchain install stable --profile minimal

      - name: Build release binary
        run: cargo build --release --locked || cargo build --release

      - name: Package release asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/release/speq dist/speq
          chmod +x dist/speq
          tar -czf "dist/speq-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz" -C dist speq

      - name: Generate checksum
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          shasum -a 256 "speq-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz" > "speq-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            dist/speq-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz
            dist/speq-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz.sha256

  publish-release:
    name: publish github release
    runs-on: ubuntu-latest
    needs: build-assets
    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.value }}
          PRERELEASE: ${{ inputs.prerelease }}
        shell: bash
        run: |
          set -euo pipefail
          args=()
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${PRERELEASE}" == "true" ]]; then
            args+=(--prerelease)
          fi
          gh release create "$TAG" \
            dist/speq-*.tar.gz \
            dist/speq-*.tar.gz.sha256 \
            --title "speq-cli $TAG" \
            --generate-notes \
            "${args[@]}"

